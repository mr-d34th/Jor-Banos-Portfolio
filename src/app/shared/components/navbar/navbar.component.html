<header class="navbar" [class.scrolled]="isScrolled()">
  <div class="navbar__inner">
    <!-- Logo -->
    <button class="navbar__logo" (click)="scrollTo('home')">
      <span class="logo__bracket">{{ '{' }}</span>
      <span class="logo__name">dev</span>
      <span class="logo__dot">.</span>
      <span class="logo__bracket">{{ '}' }}</span>
    </button>

    <!-- Desktop links -->
    <nav class="navbar__links" role="navigation" aria-label="Navegación principal">
      @for (link of links; track link.target) {
        <button
          class="nav-link"
          [style.animation-delay]="link.delay + 'ms'"
          (click)="scrollTo(link.target)"
          [attr.aria-label]="link.label | translate"
        >
          <span class="nav-link__text">{{ link.label | translate }}</span>
          <span class="nav-link__dot"></span>
        </button>
      }
    </nav>

    <!-- Lang switcher -->
    <app-lang-switcher />

    <!-- CTA Whatsapp -->
    <button class="navbar__cta" (click)="openWhatsapp()" aria-label="Contactar por WhatsApp">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"
        />
        <path
          d="M12 0C5.373 0 0 5.373 0 12c0 2.135.558 4.141 1.535 5.878L.057 23.57a.75.75 0 0 0 .93.925l5.823-1.529A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.73 9.73 0 0 1-4.964-1.358l-.356-.21-3.688.969.982-3.594-.232-.369A9.714 9.714 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"
        />
      </svg>
      <span>{{ 'nav.whatsapp' | translate }}</span>
    </button>

    <!-- Hamburger mobile -->
    <button
      class="navbar__hamburger"
      [class.open]="menuOpen()"
      (click)="toggleMenu()"
      aria-label="Abrir menú"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile menu -->
  <div class="navbar__mobile" [class.open]="menuOpen()">
    @for (link of links; track link.target) {
      <button class="mobile-link" (click)="scrollTo(link.target)">
        {{ link.label | translate }}
      </button>
    }
    <div class="mobile-lang">
      <app-lang-switcher />
    </div>
    <button class="mobile-cta" (click)="openWhatsapp()">
      {{ 'nav.whatsapp' | translate }}
    </button>
  </div>
</header>
