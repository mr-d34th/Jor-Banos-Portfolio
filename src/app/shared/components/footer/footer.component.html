<footer class="footer">
  <div class="footer__inner">
    <div class="footer__left">
      <span class="footer__logo">{{ '{' }} dev. {{ '}' }}</span>
      <p class="footer__copy">{{ 'footer.copy' | translate }} {{ currentYear }}</p>
    </div>

    <div class="footer__divider"></div>

    <nav class="footer__links" aria-label="Links sociales">
      @for (link of links; track link.label) {
        <button class="footer__link" (click)="open(link.href)">
          {{ link.label | translate }}
        </button>
      }
    </nav>
  </div>
</footer>
